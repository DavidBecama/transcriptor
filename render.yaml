services:
  - type: web
    name: transcriptor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: APIFY_API_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
