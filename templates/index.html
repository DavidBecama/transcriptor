<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transcriptor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #06060e;
      --bg-secondary: #0d0d1a;
      --surface: rgba(255,255,255,.04);
      --surface-hover: rgba(255,255,255,.07);
      --surface-border: rgba(255,255,255,.08);
      --text: #f0f0f5;
      --text-secondary: rgba(255,255,255,.45);
      --text-tertiary: rgba(255,255,255,.25);
      --accent: #a855f7;
      --accent-pink: #ec4899;
      --accent-blue: #6366f1;
      --glow: rgba(168,85,247,.25);
      --glow-pink: rgba(236,72,153,.15);
      --input-bg: rgba(255,255,255,.04);
      --input-border: rgba(255,255,255,.1);
      --input-focus: rgba(168,85,247,.4);
      --error-bg: rgba(239,68,68,.1);
      --error-border: rgba(239,68,68,.2);
      --error-text: #fca5a5;
      --result-bg: rgba(168,85,247,.06);
      --result-border: rgba(168,85,247,.15);
      --tag-ig: #e1306c;
      --tag-yt: #ff0000;
      --tag-other: rgba(255,255,255,.2);
    }

    [data-theme="light"] {
      --bg-primary: #fafafe;
      --bg-secondary: #f0f0f8;
      --surface: rgba(255,255,255,.8);
      --surface-hover: rgba(255,255,255,.95);
      --surface-border: rgba(0,0,0,.08);
      --text: #0f0f1a;
      --text-secondary: rgba(0,0,0,.5);
      --text-tertiary: rgba(0,0,0,.25);
      --glow: rgba(168,85,247,.12);
      --glow-pink: rgba(236,72,153,.08);
      --input-bg: rgba(0,0,0,.03);
      --input-border: rgba(0,0,0,.12);
      --input-focus: rgba(168,85,247,.3);
      --error-bg: rgba(239,68,68,.08);
      --error-border: rgba(239,68,68,.15);
      --error-text: #dc2626;
      --result-bg: rgba(168,85,247,.04);
      --result-border: rgba(168,85,247,.12);
      --tag-other: rgba(0,0,0,.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-primary);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background .4s ease, color .4s ease;
    }

    /* ── Animated mesh background ─────────────────── */

    .bg-mesh {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-mesh .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: .35;
      animation: float 20s ease-in-out infinite;
    }

    [data-theme="light"] .bg-mesh .orb { opacity: .2; }

    .bg-mesh .orb-1 {
      width: 600px; height: 600px;
      background: var(--accent);
      top: -200px; left: -100px;
      animation-delay: 0s;
    }

    .bg-mesh .orb-2 {
      width: 500px; height: 500px;
      background: var(--accent-pink);
      bottom: -150px; right: -100px;
      animation-delay: -7s;
      animation-duration: 25s;
    }

    .bg-mesh .orb-3 {
      width: 400px; height: 400px;
      background: var(--accent-blue);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -14s;
      animation-duration: 30s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -40px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(.95); }
      75% { transform: translate(40px, 30px) scale(1.02); }
    }

    /* ── Noise texture overlay ────────────────────── */

    .bg-noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: .03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
    }

    /* ── Layout ───────────────────────────────────── */

    .container {
      position: relative;
      z-index: 2;
      max-width: 580px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-pink) 50%, var(--accent-blue) 100%);
      background-size: 200% 200%;
      animation: gradient-shift 6s ease infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .theme-toggle {
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--surface-border);
      border-radius: 12px;
      width: 42px;
      height: 42px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .25s ease;
    }

    .theme-toggle:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--glow);
    }

    /* ── Glass Card ───────────────────────────────── */

    .card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--surface-border);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 20px;
      transition: all .3s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
    }

    .card:hover {
      border-color: rgba(168,85,247,.15);
      box-shadow: 0 8px 40px rgba(0,0,0,.15), 0 0 60px var(--glow);
    }

    .card-title {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -.01em;
      margin-bottom: 4px;
    }

    .card-subtitle {
      color: var(--text-secondary);
      font-size: .85rem;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* ── Form ─────────────────────────────────────── */

    label {
      display: block;
      font-weight: 600;
      font-size: .7rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input, select {
      width: 100%;
      padding: 13px 16px;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: 12px;
      font-family: inherit;
      font-size: .9rem;
      color: var(--text);
      transition: all .25s ease;
      outline: none;
      margin-bottom: 18px;
    }

    input::placeholder { color: var(--text-tertiary); }
    select { cursor: pointer; }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--input-focus), 0 0 20px var(--glow);
    }

    /* ── Glow Button ──────────────────────────────── */

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-pink) 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .25s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,.15) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform .5s ease;
    }

    .btn-primary:hover::before { transform: translateX(100%); }

    .btn-primary:hover {
      box-shadow: 0 4px 24px var(--glow), 0 8px 40px var(--glow-pink);
      transform: translateY(-1px);
    }

    .btn-primary:active { transform: translateY(0) scale(.99); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-primary:disabled::before { display: none; }

    /* ── Spinner (snowball) ─────────────────────────── */

    .spinner {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin-top: 28px;
    }

    .spinner.visible { display: flex; }

    .spinner-text {
      font-size: .85rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .pl {
      width: 6em;
      height: 6em;
      position: relative;
      font-size: 20px;
    }

    .pl__outer-ring,
    .pl__inner-ring,
    .pl__track-cover {
      position: absolute;
      border-radius: 50%;
    }

    .pl__outer-ring {
      inset: 0;
      border: .35em solid rgba(168,85,247,.15);
    }

    .pl__inner-ring {
      inset: .7em;
      border: .35em solid rgba(236,72,153,.1);
    }

    .pl__track-cover {
      inset: 0;
      width: 100%;
      height: 100%;
      border: .35em solid transparent;
      border-top-color: var(--accent);
      border-right-color: var(--accent-pink);
      animation: trackCover 1.8s linear infinite;
      filter: drop-shadow(0 0 6px var(--glow));
    }

    .pl__ball {
      position: absolute;
      width: 1.2em;
      height: 1.2em;
      top: 50%;
      left: 50%;
      margin: -.6em 0 0 -.6em;
      border-radius: 50%;
      animation: ball 1.8s linear infinite;
    }

    .pl__ball-texture {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-pink) 50%, var(--accent-blue) 100%);
      background-size: 200% 100%;
      animation: ballTexture 1.8s linear infinite;
    }

    .pl__ball-outer-shadow {
      position: absolute;
      inset: -.15em;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, transparent 50%, rgba(0,0,0,.3) 100%);
      animation: ballOuterShadow 1.8s linear infinite;
    }

    .pl__ball-inner-shadow {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 65% 35%, rgba(255,255,255,.4) 0%, transparent 50%);
      animation: ballInnerShadow 1.8s linear infinite;
    }

    .pl__ball-side-shadows {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      box-shadow: inset .1em .1em .2em rgba(0,0,0,.2), inset -.05em -.05em .15em rgba(255,255,255,.1);
    }

    @keyframes ball {
      from { transform: rotate(0) translateY(-2.15em); }
      50% { transform: rotate(180deg) translateY(-1.85em); }
      to { transform: rotate(360deg) translateY(-2.15em); }
    }

    @keyframes ballInnerShadow {
      from { transform: rotate(0); }
      to { transform: rotate(-360deg); }
    }

    @keyframes ballOuterShadow {
      from { transform: rotate(20deg); }
      to { transform: rotate(-340deg); }
    }

    @keyframes ballTexture {
      from { transform: translateX(0); }
      to { transform: translateX(50%); }
    }

    @keyframes trackCover {
      from { transform: rotate(0); }
      to { transform: rotate(360deg); }
    }

    /* ── Result ───────────────────────────────────── */

    .result {
      margin-top: 24px;
      padding: 20px;
      background: var(--result-bg);
      border: 1px solid var(--result-border);
      border-radius: 14px;
      font-size: .9rem;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
      animation: fadeUp .4s ease;
    }

    .result.visible { display: block; }

    .result.error {
      background: var(--error-bg);
      border-color: var(--error-border);
      color: var(--error-text);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .btn-small {
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s ease;
      backdrop-filter: blur(8px);
    }

    .btn-small:hover {
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--glow);
      background: var(--surface-hover);
    }

    /* ── History ──────────────────────────────────── */

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .history-header h2 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -.01em;
    }

    .history-count {
      background: linear-gradient(135deg, var(--accent), var(--accent-pink));
      color: #fff;
      font-size: .65rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .history-list { list-style: none; }

    .history-item {
      padding: 16px 0;
      border-bottom: 1px solid var(--surface-border);
      transition: all .15s ease;
      animation: fadeUp .3s ease;
    }

    .history-item:last-child { border-bottom: none; }

    .history-item-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .platform-tag {
      font-size: .6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      padding: 3px 8px;
      border-radius: 6px;
      color: #fff;
    }

    .platform-tag.instagram { background: var(--tag-ig); }
    .platform-tag.youtube { background: var(--tag-yt); }
    .platform-tag.otro { background: var(--tag-other); color: var(--text-secondary); }
    .platform-tag.tiktok { background: #25f4ee; color: #010101; }

    .history-date {
      font-size: .72rem;
      color: var(--text-tertiary);
    }

    .history-preview {
      font-size: .82rem;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.5;
    }

    .history-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .btn-icon {
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 8px;
      padding: 5px 12px;
      cursor: pointer;
      font-family: inherit;
      font-size: .72rem;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all .2s ease;
    }

    .btn-icon:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 12px var(--glow);
    }

    .btn-icon.delete:hover {
      border-color: #ef4444;
      color: #ef4444;
      box-shadow: 0 0 12px rgba(239,68,68,.15);
    }

    .empty-state {
      text-align: center;
      color: var(--text-tertiary);
      padding: 36px 0;
      font-size: .85rem;
    }

    /* ── Footer ───────────────────────────────────── */

    footer {
      text-align: center;
      margin-top: 24px;
      font-size: .75rem;
      color: var(--text-tertiary);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: color .2s;
    }

    footer a:hover { color: var(--accent-pink); }

    /* ── Responsive ───────────────────────────────── */

    @media (max-width: 480px) {
      .container { padding: 20px 14px 36px; }
      .card { padding: 24px 20px; border-radius: 16px; }
      .logo { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <!-- Animated background -->
  <div class="bg-mesh">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="bg-noise"></div>

  <div class="container">
    <header>
      <span class="logo">Transcriptor</span>
      <button class="theme-toggle" id="themeToggle" title="Cambiar tema">&#9790;</button>
    </header>

    <!-- Transcription form -->
    <div class="card">
      <h1 class="card-title">Transcribir v&iacute;deo</h1>
      <p class="card-subtitle">Pega la URL de un reel de Instagram o v&iacute;deo de YouTube</p>

      <form id="form">
        <label for="url">URL del v&iacute;deo</label>
        <input id="url" type="url" placeholder="https://www.instagram.com/reel/..." required />

        <label for="language">Idioma (opcional)</label>
        <select id="language">
          <option value="">Detectar autom&aacute;ticamente</option>
          <option value="es">Espa&ntilde;ol</option>
          <option value="en">Ingl&eacute;s</option>
          <option value="fr">Franc&eacute;s</option>
          <option value="pt">Portugu&eacute;s</option>
          <option value="de">Alem&aacute;n</option>
          <option value="it">Italiano</option>
        </select>

        <button type="submit" class="btn-primary" id="btn">Transcribir</button>
      </form>

      <div class="spinner" id="spinner">
        <div class="pl">
          <div class="pl__outer-ring"></div>
          <div class="pl__inner-ring"></div>
          <div class="pl__track-cover"></div>
          <div class="pl__ball">
            <div class="pl__ball-texture"></div>
            <div class="pl__ball-outer-shadow"></div>
            <div class="pl__ball-inner-shadow"></div>
            <div class="pl__ball-side-shadows"></div>
          </div>
        </div>
        <span class="spinner-text">Transcribiendo...</span>
      </div>

      <div class="result" id="result"></div>
    </div>

    <!-- History -->
    <div class="card" id="historyCard">
      <div class="history-header">
        <h2>Historial</h2>
        <span class="history-count" id="historyCount">0</span>
      </div>
      <ul class="history-list" id="historyList">
        <li class="empty-state" id="emptyState">A&uacute;n no hay transcripciones</li>
      </ul>
    </div>

    <footer>
      <span>Hecho por <a href="https://instagram.com/__davidayala" target="_blank" rel="noopener">@__davidayala</a></span>
      <span>Transcriptor &mdash; Flask, yt-dlp &amp; Groq Whisper</span>
    </footer>
  </div>

  <script>
    // ── Theme ──────────────────────────────────────────
    const themeToggle = document.getElementById("themeToggle");
    const savedTheme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);
    themeToggle.textContent = savedTheme === "dark" ? "\u2600\uFE0F" : "\u263E";

    themeToggle.addEventListener("click", () => {
      const current = document.documentElement.getAttribute("data-theme");
      const next = current === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
      themeToggle.textContent = next === "dark" ? "\u2600\uFE0F" : "\u263E";
    });

    // ── Form ───────────────────────────────────────────
    const form = document.getElementById("form");
    const btn = document.getElementById("btn");
    const spinner = document.getElementById("spinner");
    const resultDiv = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const url = document.getElementById("url").value.trim();
      const language = document.getElementById("language").value;

      btn.disabled = true;
      spinner.classList.add("visible");
      resultDiv.classList.remove("visible", "error");
      resultDiv.innerHTML = "";

      try {
        const res = await fetch("/transcribe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url, language }),
        });
        const data = await res.json();

        if (!res.ok) {
          resultDiv.classList.add("error");
          resultDiv.textContent = data.error || "Error desconocido";
        } else {
          resultDiv.textContent = data.text;

          const actions = document.createElement("div");
          actions.className = "result-actions";

          const copyBtn = document.createElement("button");
          copyBtn.className = "btn-small";
          copyBtn.textContent = "Copiar";
          copyBtn.addEventListener("click", (ev) => {
            ev.stopPropagation();
            navigator.clipboard.writeText(data.text);
            copyBtn.textContent = "\u2713 Copiado";
            setTimeout(() => (copyBtn.textContent = "Copiar"), 2000);
          });

          actions.appendChild(copyBtn);
          resultDiv.appendChild(actions);

          loadHistory();
        }
      } catch {
        resultDiv.classList.add("error");
        resultDiv.textContent = "Error de conexi\u00f3n con el servidor";
      }

      resultDiv.classList.add("visible");
      spinner.classList.remove("visible");
      btn.disabled = false;
    });

    // ── History ────────────────────────────────────────
    const historyList = document.getElementById("historyList");
    const historyCount = document.getElementById("historyCount");

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString("es-ES", {
        day: "numeric", month: "short", year: "numeric",
        hour: "2-digit", minute: "2-digit",
      });
    }

    async function loadHistory() {
      try {
        const res = await fetch("/history");
        const items = await res.json();
        historyCount.textContent = items.length;

        if (items.length === 0) {
          historyList.innerHTML = '<li class="empty-state">A\u00fan no hay transcripciones</li>';
          return;
        }

        historyList.innerHTML = items.map(item => `
          <li class="history-item" data-id="${item.id}">
            <div class="history-item-header">
              <span class="platform-tag ${item.platform}">${item.platform}</span>
              <span class="history-date">${formatDate(item.created_at)}</span>
            </div>
            <div class="history-preview">${escapeHtml(item.text.slice(0, 120))}${item.text.length > 120 ? '...' : ''}</div>
            <div class="history-actions">
              <button class="btn-icon" onclick="copyText(event, ${item.id})" title="Copiar">Copiar</button>
              <button class="btn-icon" onclick="downloadItem(event, ${item.id})" title="Descargar">Descargar .txt</button>
              <button class="btn-icon delete" onclick="deleteItem(event, ${item.id})" title="Eliminar">Eliminar</button>
            </div>
          </li>
        `).join("");
      } catch {
        // silently fail
      }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    async function copyText(e, id) {
      e.stopPropagation();
      const res = await fetch("/history");
      const items = await res.json();
      const item = items.find(i => i.id === id);
      if (item) {
        navigator.clipboard.writeText(item.text);
        e.target.textContent = "\u2713 Copiado";
        setTimeout(() => (e.target.textContent = "Copiar"), 2000);
      }
    }

    function downloadItem(e, id) {
      e.stopPropagation();
      window.open(`/download/${id}`, "_blank");
    }

    async function deleteItem(e, id) {
      e.stopPropagation();
      await fetch(`/history/${id}`, { method: "DELETE" });
      loadHistory();
    }

    loadHistory();
  </script>
</body>
</html>
